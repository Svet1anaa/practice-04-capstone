version: "3.8"

# EAI Capstone — Docker Compose
# Host ports are configurable via .env file (copy from .env.example).
# Internal service-to-service communication always uses fixed internal ports
# and Docker service names as hostnames.
# Start:   docker-compose up -d --build
# Stop:    docker-compose down
# Rebuild: docker-compose up -d --build --force-recreate

services:
  # ── Node-RED Orchestration & Integration Layer ──────────────────────
  nodered:
    build:
      context: .
      dockerfile: Dockerfile.nodered
    ports:
      - "${NODERED_HOST_PORT:-1880}:1880"
    volumes:
      - nodered_data:/data
      - ./flows.json:/data/flows.json
    environment:
      ORDER_URL: http://order-service:3001
      PAYMENT_URL: http://payment-service:3002
      INVENTORY_URL: http://inventory-service:3003
      NOTIFICATION_URL: http://notification-service:3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      - eai-capstone-network
    depends_on:
      - rabbitmq
      - order-service
      - payment-service
      - inventory-service
      - notification-service

  # ── Order Service ────────────────────────────────────────────────────
  order-service:
    build: ./order-service
    ports:
      - "${ORDER_HOST_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODERED_URL: http://nodered:1880
      PAYMENT_URL: http://payment-service:3002
      INVENTORY_URL: http://inventory-service:3003
      NOTIFICATION_URL: http://notification-service:3004
    networks:
      - eai-capstone-network

  # ── Payment Service ──────────────────────────────────────────────────
  payment-service:
    build: ./payment-service
    ports:
      - "${PAYMENT_HOST_PORT:-3002}:3002"
    environment:
      PORT: 3002
      PAYMENT_FAIL_MODE: never
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PAYMENT_COMMAND_QUEUE: payment.commands
      PAYMENT_REPLY_QUEUE: payment.replies
      PAYMENT_DLX: payment.dlx
      PAYMENT_DLQ: payment.dlq
    networks:
      - eai-capstone-network
    depends_on:
      - rabbitmq

  # ── Inventory Service ────────────────────────────────────────────────
  inventory-service:
    build: ./inventory-service
    ports:
      - "${INVENTORY_HOST_PORT:-3003}:3003"
    environment:
      PORT: 3003
      INVENTORY_FAIL_MODE: never
    networks:
      - eai-capstone-network

  # ── Notification Service ─────────────────────────────────────────────
  notification-service:
    build: ./notification-service
    ports:
      - "${NOTIFICATION_HOST_PORT:-3004}:3004"
    environment:
      PORT: 3004
    volumes:
      - ./notification-service/data:/data
    networks:
      - eai-capstone-network

  # ── RabbitMQ ────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_AMQP_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    networks:
      - eai-capstone-network

networks:
  eai-capstone-network:
    driver: bridge

volumes:
  nodered_data:
